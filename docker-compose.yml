version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qubicflow-backend:latest
    container_name: qubicflow-backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - qubicflow-data:/app/data
    user: "1000:1000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: qubicflow-frontend:latest
    container_name: qubicflow-frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  restarter:
    image: docker:cli
    container_name: qubicflow-restarter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c 'echo "0 3 * * * docker restart qubicflow-backend" | crontab - && crond -f -l 8'
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  qubicflow-data:
    driver: local
