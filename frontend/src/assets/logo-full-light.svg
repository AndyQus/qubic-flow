<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 150" width="480" height="150">
  <title>QubicFlow</title>
  <defs>
    <linearGradient id="accent-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A0A0"/>
      <stop offset="100%" stop-color="#006666"/>
    </linearGradient>
    <linearGradient id="left-split-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00A0A0"/>
      <stop offset="50%" stop-color="#006666"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="text-grad-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#006666"/>
    </linearGradient>
  </defs>

  <!-- Background (light) -->
  <rect width="480" height="150" rx="14" fill="#FFFFFF"/>
  <rect width="480" height="150" rx="14" fill="none" stroke="#006666" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Mark: Qubic bars centered in the mark area (x=0..160) -->
  <g transform="translate(53.6, 29.77) scale(1.75)">
    <path fill="url(#left-split-l)"
          d="M11.308 0H1.615C.723 0 0 .724 0 1.616v35.538c0 .892.723 1.616 1.615 1.616h9.693c.892 0 1.615-.724 1.615-1.616V1.616C12.923.724 12.2 0 11.308 0Z"/>
    <path fill="url(#accent-l)"
          d="M28.538 0h-9.692c-.892 0-1.616.723-1.616 1.615v48.462c0 .892.724 1.615 1.616 1.615h9.692c.892 0 1.616-.723 1.616-1.615V1.615C30.154.723 29.43 0 28.538 0Z"/>
  </g>

  <!-- Separator -->
  <rect x="160" y="24" width="1" height="102" fill="#006666" fill-opacity="0.25"/>

  <!-- Wordmark -->
  <text x="182" y="78" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="46" font-weight="900" letter-spacing="-1.5" fill="url(#text-grad-l)">QubicFlow</text>

  <!-- Tagline (50% larger) -->
  <circle cx="185" cy="110" r="2.5" fill="#006666" fill-opacity="0.6"/>
  <text x="196" y="115" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" letter-spacing="4" fill="#006666" fill-opacity="0.85">WALLET TRACKER</text>
</svg>
