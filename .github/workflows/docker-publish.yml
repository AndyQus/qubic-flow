name: Build & Publish Docker Images

on:
  push:
    branches:
      - main          # Trigger on every merge to main
  workflow_dispatch:  # Allow manual re-run if the action fails

jobs:

  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT


  build-backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/qubicflow-backend:${{ needs.prepare.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/qubicflow-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  build-frontend:
    name: Frontend (Vue + Nginx)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/qubicflow-frontend:${{ needs.prepare.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/qubicflow-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  update-umbrel-store:
    name: Update Umbrel Store Version
    runs-on: ubuntu-latest
    needs: [prepare, build-backend, build-frontend]
    steps:
      - name: Checkout Umbrel store repo
        uses: actions/checkout@v4
        with:
          repository: AndyQus/qubicflow-umbrel-store
          token: ${{ secrets.STORE_REPO_TOKEN }}
          path: umbrel-store

      - name: Update version in store files
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          DOCKER_USER=${{ secrets.DOCKERHUB_USERNAME }}

          sed -i "s|image: .*/qubicflow-backend:.*|image: ${DOCKER_USER}/qubicflow-backend:${VERSION}|g" \
            umbrel-store/qfstore-qubicflow/docker-compose.yml

          sed -i "s|image: .*/qubicflow-frontend:.*|image: ${DOCKER_USER}/qubicflow-frontend:${VERSION}|g" \
            umbrel-store/qfstore-qubicflow/docker-compose.yml

          sed -i "s|^version:.*|version: \"${VERSION}\"|g" \
            umbrel-store/qfstore-qubicflow/umbrel-app.yml

      - name: Commit and push to store repo
        run: |
          cd umbrel-store
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qfstore-qubicflow/docker-compose.yml qfstore-qubicflow/umbrel-app.yml
          git commit -m "chore: bump version to ${{ needs.prepare.outputs.version }}"
          git push

      - name: Summary
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          echo "## Release ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/qubicflow-backend:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/qubicflow-frontend:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Umbrel store updated automatically" >> $GITHUB_STEP_SUMMARY
